<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" fill="none">
  <!-- Africa silhouette with three accent stripes -->
  <g transform="translate(330, 8)">
    <!-- Africa shape (simplified) -->
    <path d="M 60 8
             C 78 8, 92 14, 102 28
             C 110 38, 116 50, 118 64
             C 120 78, 116 92, 110 104
             C 105 116, 102 128, 102 138
             C 102 148, 105 156, 110 162
             C 112 166, 112 170, 110 172
             C 105 174, 100 170, 95 162
             C 90 154, 85 152, 78 156
             C 70 162, 62 168, 56 168
             C 48 168, 42 162, 38 152
             C 33 142, 28 132, 24 122
             C 18 110, 14 96, 12 80
             C 10 64, 14 50, 22 38
             C 32 22, 46 12, 60 8 Z"
          fill="#2DA67E"/>
    <!-- Three white stripes -->
    <path d="M 28 50 C 50 38, 80 36, 108 44" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M 22 70 C 50 56, 88 54, 118 64" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M 18 92 C 50 78, 92 76, 116 84" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- MOMENTUM wordmark -->
  <text x="0" y="150"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="64"
        letter-spacing="-1"
        fill="#1A2D3A">MOMENTUM</text>

  <!-- AFRICA PARTNERS subtitle -->
  <g transform="translate(34, 178)">
    <circle cx="0" cy="-4" r="3.5" fill="#2DA67E"/>
    <text x="10" y="0"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-weight="600"
          font-size="18"
          letter-spacing="3"
          fill="#2DA67E">AFRICA PARTNERS</text>
  </g>
</svg>
